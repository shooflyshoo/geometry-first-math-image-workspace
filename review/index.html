<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Geometry First Math, Pilot 20 Review</title>
  <style>
    :root { color-scheme: dark; --bg:#0b1020; --card:#121a31; --muted:#90a0c0; --text:#eef2ff; --accent:#8ab4ff; --border:#233055; }
    * { box-sizing:border-box; }
    body { margin:0; font:16px/1.45 Inter, system-ui, sans-serif; background:linear-gradient(180deg,#0b1020,#0e1328); color:var(--text); }
    header { padding:28px 24px 12px; max-width:1200px; margin:0 auto; }
    h1 { margin:0 0 8px; font-size:32px; }
    p, li { color:var(--muted); }
    .toolbar { display:flex; gap:12px; flex-wrap:wrap; margin-top:16px; }
    input { background:#0d1530; border:1px solid var(--border); color:var(--text); border-radius:10px; padding:10px 12px; min-width:260px; }
    main { max-width:1200px; margin:0 auto; padding:16px 24px 40px; display:grid; gap:18px; }
    .card { background:rgba(18,26,49,.95); border:1px solid var(--border); border-radius:18px; overflow:hidden; box-shadow:0 12px 40px rgba(0,0,0,.22); }
    .grid { display:grid; grid-template-columns: minmax(280px, 1.2fr) minmax(280px, 1fr); gap:0; }
    .media { background:#0a0f1f; display:flex; align-items:center; justify-content:center; min-height:320px; }
    .media img { width:100%; height:100%; object-fit:contain; display:block; }
    .content { padding:18px; }
    .meta { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px; }
    .badge { border:1px solid var(--border); color:var(--accent); border-radius:999px; padding:4px 10px; font-size:12px; }
    h2 { font-size:22px; margin:0 0 12px; }
    details { border-top:1px solid var(--border); margin-top:14px; padding-top:12px; }
    summary { cursor:pointer; color:var(--accent); }
    .excerpt { background:#0d1530; border:1px solid var(--border); border-radius:14px; padding:12px 14px; margin-top:12px; }
    .excerpt p { color:#d9e2ff; margin:0 0 10px; }
    .tiny { font-size:13px; color:var(--muted); }
    @media (max-width: 860px) { .grid { grid-template-columns: 1fr; } header, main { padding-left:14px; padding-right:14px; } }
  </style>
</head>
<body>
  <header>
    <h1>Geometry First Math, pilot 20 review</h1>
    <p>Generated pilot images shown beside the fresh manuscript context they appear to support. Best used in Codespaces or any local static server.</p>
    <div class="toolbar">
      <input id="search" placeholder="Filter by title, section, or prompt id" />
    </div>
  </header>
  <main id="app"></main>
  <script>
    async function run() {
      const res = await fetch('./pilot-review-data.json');
      const data = await res.json();
      const app = document.getElementById('app');
      const search = document.getElementById('search');
      const items = data.items;
      const render = () => {
        const q = search.value.trim().toLowerCase();
        const filtered = !q ? items : items.filter(item =>
          [item.prompt_id, item.section_id, item.title, item.role, item.placement].filter(Boolean).join(' ').toLowerCase().includes(q)
        );
        app.innerHTML = filtered.map(item => `
          <section class="card">
            <div class="grid">
              <div class="media">${item.image ? `<img src="../${item.image}" alt="${item.title}">` : '<div class="tiny">No image file found</div>'}</div>
              <div class="content">
                <div class="meta">
                  <span class="badge">${item.prompt_id}</span>
                  <span class="badge">${item.section_id}</span>
                  <span class="badge">${item.placement || 'pilot image'}</span>
                </div>
                <h2>${item.title}</h2>
                <p>${item.role || ''}</p>
                <div class="excerpt">
                  <div class="tiny">Fresh manuscript excerpt, paragraphs ${item.excerpt_range[0]}-${item.excerpt_range[1]} (${item.match.method}, score ${item.match.score})</div>
                  ${item.excerpt.map(p => `<p>${p}</p>`).join('')}
                </div>
                <details>
                  <summary>Show source prompt</summary>
                  <p class="tiny">${item.prompt}</p>
                </details>
              </div>
            </div>
          </section>
        `).join('');
      };
      search.addEventListener('input', render);
      render();
    }
    run();
  </script>
</body>
</html>
